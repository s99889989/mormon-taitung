<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -160 320 320" width="512" height="512">
  <!-- 台東一支會 Logo — 方案 C：太平洋日出六角形 -->
  <!-- 元素：六角形底、天空、日出放射線、太陽、中央山脈、太平洋海浪、白色十字架、原住民菱形紋、金色邊框 -->

  <defs>
    <clipPath id="hex">
      <polygon points="0,-160 139,-80 139,80 0,160 -139,80 -139,-80"/>
    </clipPath>
  </defs>

  <!-- 六角底色 -->
  <polygon points="0,-160 139,-80 139,80 0,160 -139,80 -139,-80" fill="#0A2744"/>

  <!-- 天空 -->
  <rect x="-139" y="-160" width="278" height="182" fill="#1255A0" clip-path="url(#hex)"/>

  <!-- 日出放射線 -->
  <g clip-path="url(#hex)" opacity="0.28">
    <line x1="0" y1="-22" x2="0"    y2="-160" stroke="#FFB830" stroke-width="3"/>
    <line x1="0" y1="-22" x2="120"  y2="-115" stroke="#FFB830" stroke-width="2.5"/>
    <line x1="0" y1="-22" x2="-120" y2="-115" stroke="#FFB830" stroke-width="2.5"/>
    <line x1="0" y1="-22" x2="85"   y2="-148" stroke="#FFB830" stroke-width="1.5"/>
    <line x1="0" y1="-22" x2="-85"  y2="-148" stroke="#FFB830" stroke-width="1.5"/>
    <line x1="0" y1="-22" x2="139"  y2="-22"  stroke="#FFB830" stroke-width="1.5"/>
    <line x1="0" y1="-22" x2="-139" y2="-22"  stroke="#FFB830" stroke-width="1.5"/>
    <line x1="0" y1="-22" x2="139"  y2="50"   stroke="#FFB830" stroke-width="1"/>
    <line x1="0" y1="-22" x2="-139" y2="50"   stroke="#FFB830" stroke-width="1"/>
  </g>

  <!-- 太陽 -->
  <circle cx="0" cy="-22" r="36" fill="#FFB830" clip-path="url(#hex)"/>
  <circle cx="0" cy="-22" r="24" fill="#FFEC6E" clip-path="url(#hex)"/>
  <circle cx="0" cy="-22" r="14" fill="#FFFDE0" clip-path="url(#hex)"/>

  <!-- 中央山脈 -->
  <polygon points="-139,28 -100,-30 -68,10 -32,-52 0,-10 32,-44 68,8 100,-20 139,28 139,160 -139,160"
           fill="#1B4D1B" clip-path="url(#hex)"/>
  <!-- 山脈亮面 -->
  <polygon points="-32,-52 -12,-20 0,-10"  fill="#2E6B2E" opacity="0.55" clip-path="url(#hex)"/>
  <polygon points="32,-44 52,-14 68,8"     fill="#2E6B2E" opacity="0.55" clip-path="url(#hex)"/>

  <!-- 太平洋海浪 -->
  <path d="M-139,62 Q-104,46 -70,62 Q-35,78 0,62 Q35,46 70,62 Q104,78 139,62 L139,160 L-139,160 Z"
        fill="#1255A0" clip-path="url(#hex)"/>
  <path d="M-139,88 Q-104,74 -70,88 Q-35,102 0,88 Q35,74 70,88 Q104,102 139,88 L139,160 L-139,160 Z"
        fill="#0A3A80" clip-path="url(#hex)"/>
  <path d="M-139,114 Q-104,102 -70,114 Q-35,126 0,114 Q35,102 70,114 Q104,126 139,114 L139,160 L-139,160 Z"
        fill="#072560" clip-path="url(#hex)"/>

  <!-- 白色十字架 -->
  <rect x="-10" y="-60" width="20" height="66" fill="#FFFFFF" rx="4"/>
  <rect x="-36" y="-38" width="72" height="20" fill="#FFFFFF" rx="4"/>

  <!-- 原住民菱形紋（底部） -->
  <g clip-path="url(#hex)">
    <polygon points="0,128 14,114 0,100 -14,114"   fill="#FFD700"/>
    <polygon points="28,142 40,130 28,118 16,130"  fill="#FFD700" opacity="0.7"/>
    <polygon points="-28,142 -16,130 -28,118 -40,130" fill="#FFD700" opacity="0.7"/>
    <polygon points="56,152 66,142 56,132 46,142"  fill="#FFD700" opacity="0.4"/>
    <polygon points="-56,152 -46,142 -56,132 -66,142" fill="#FFD700" opacity="0.4"/>
  </g>

  <!-- 六角金色外框 -->
  <polygon points="0,-160 139,-80 139,80 0,160 -139,80 -139,-80"
           fill="none" stroke="#FFB830" stroke-width="5"/>
  <!-- 六角內框（細） -->
  <polygon points="0,-148 128,-74 128,74 0,148 -128,74 -128,-74"
           fill="none" stroke="#FFB830" stroke-width="1.5" opacity="0.35"/>
</svg>
